openapi: 3.0.3
info:
  title: Delete Reservation API
  version: 1.0.0

paths:
  /api/reservations/{id}:
    delete:
      summary: Delete a reservation
      description: Deletes a reservation by its ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
            example: "E8095506-4A22-41AC-823D-C3C8E6E3D8F1"
      responses:
        '204':
          description: Reservation deleted successfully
        '404':
          description: Reservation not found